var qs=[],cur=0,sc=0,locked=false;
var KEYS=['a','b','c'];

function shuf(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=b[i]; b[i]=b[j]; b[j]=t;
  }
  return b;
}

function avvia(){
  var m=document.getElementById('sel').value;
  var pool=Q;
  if(m==='f') pool=Q.filter(function(x){return x.d==='f';});
  if(m==='d') pool=Q.filter(function(x){return x.d==='d';});
  qs=shuf(pool);
  if(m==='exam') qs=qs.slice(0,25);
  cur=0; sc=0; locked=false;
  document.getElementById('pbar_wrap').style.display='block';
  mostraQ();
}

function mostraQ(){
  if(cur>=qs.length){mostraScore();return;}
  var q=qs[cur];
  var pct=Math.round(cur/qs.length*100);
  document.getElementById('pbar').style.width=pct+'%';
  locked=false;

  var opzioni='';
  for(var i=0;i<3;i++){
    opzioni+='<div class="opt" id="opt_'+KEYS[i]+'" onclick="scegli(\''+KEYS[i]+'\')">'+
      '<span class="opt-key">'+KEYS[i].toUpperCase()+'.</span>'+
      '<span class="opt-text">'+q.ops[i]+'</span>'+
      '</div>';
  }

  var badge=q.d==='f'
    ?'<span class="badge badge-f">facile</span>'
    :'<span class="badge badge-d">difficile</span>';

  document.getElementById('zona').innerHTML=
    '<div class="card">'+
      '<div class="qmeta">Domanda '+(cur+1)+' di '+qs.length+' '+badge+'</div>'+
      '<div class="qtext">'+q.q+'</div>'+
      opzioni+
      '<div class="feedback" id="fb"></div>'+
    '</div>'+
    '<div class="nav">'+
      '<span class="score-label">Punteggio: '+sc+'/'+cur+'</span>'+
      '<button class="btn-next" id="btnNext" onclick="avanti()">Prossima →</button>'+
    '</div>';
}

function scegli(k){
  if(locked) return;
  locked=true;
  var q=qs[cur];
  var corr=q.c;

  for(var i=0;i<3;i++){
    var key=KEYS[i];
    var el=document.getElementById('opt_'+key);
    el.onclick=null;
    if(key===corr){
      el.className='opt correct';
    } else if(key===k){
      el.className='opt wrong';
    } else {
      el.className='opt dim';
    }
  }

  if(k===corr) sc++;

  var fb=document.getElementById('fb');
  if(k===corr){
    fb.className='feedback ok';
    fb.textContent='✓ Corretto!';
  } else {
    fb.className='feedback ko';
    fb.textContent='✗ Sbagliato. La risposta corretta è evidenziata in verde.';
  }

  document.getElementById('btnNext').style.display='inline-block';
}

function avanti(){
  cur++;
  mostraQ();
}

function mostraScore(){
  var pct=Math.round(sc/qs.length*100);
  var col=pct>=80?'#16a34a':pct>=60?'#d97706':'#dc2626';
  var msg=pct>=80?'Ottimo risultato! 🎉':pct>=60?'Buono, puoi migliorare.':'Riprova, puoi farcela!';
  document.getElementById('pbar').style.width='100%';
  document.getElementById('zona').innerHTML=
    '<div class="score-card">'+
      '<div class="score-num" style="color:'+col+'">'+sc+'/'+qs.length+'</div>'+
      '<div class="score-pct">'+pct+'%</div>'+
      '<div class="score-msg" style="color:'+col+'">'+msg+'</div>'+
      '<button class="btn-restart" onclick="avvia()">↺ Ricomincia</button>'+
      '<div class="donation-box">'+
        '<p>🍄 Se questo strumento ti ha aiutato a superare l\'esame, offrimi un caffè! ☕</p>'+
        '<a class="btn-donate" href="https://paypal.me/Zigtof" target="_blank">💙 Dona con PayPal</a>'+
      '</div>'+
    '</div>';
}
</script>
